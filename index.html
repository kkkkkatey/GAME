<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>武俠文字冒險</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen1" class="screen active">
    <h1>開始新的旅程</h1>
    <p>設定你的基本資料</p>
    <form id="characterForm">
      姓名：<input type="text" id="name"><br>
      性別：
      <select id="gender">
        <option>男</option>
        <option>女</option>
      </select><br>
      出身：
      <select id="origin">
        <option>世家子弟</option>
        <option>平民百姓</option>
        <option>孤兒</option>
      </select><br>
      <button type="button" id="startBtn">踏入修行界</button>
    </form>
  </div>

  <div id="screen2" class="screen">
    <div class="story-box"> 
      <h2>你的旅程開始了！</h2>
    </div>
    <div class="info-box"> 
      <p id="summary"></p> 
      <button id="nextBtn">繼續冒險</button> 
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
