<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>武俠文字冒險</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input, select, button {
      margin: 10px 0;
      padding: 8px;
      width: 80%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <!-- 第一個畫面：角色建立 -->
  <div id="screen1" class="screen active">
    <h1>開始新的旅程</h1>
    <p>諸天萬界將如何稱呼你？</p>
    <form id="characterForm">
      姓名：<input type="text" id="name"><br>
      性別：
      <select id="gender">
        <option>男</option>
        <option>女</option>
      </select><br>
      出身：
      <select id="origin">
        <option>世家子弟</option>
        <option>平民百姓</option>
        <option>孤兒</option>
      </select><br>
      <button type="button" id="startBtn">踏入修行界</button>
    </form>
  </div>

  <!-- 第二個畫面：遊戲開始 -->
  <div id="screen2" class="screen">
    <h2>你的旅程開始了！</h2>
    <p id="summary"></p>
  </div>

  <script>
    document.getElementById("startBtn").addEventListener("click", function() {
      // 取得玩家輸入
      const name = document.getElementById("name").value;
      const gender = document.getElementById("gender").value;
      const origin = document.getElementById("origin").value;

      // 顯示角色資訊
      document.getElementById("summary").innerText =
        `姓名：${name}\n性別：${gender}\n出身：${origin}`;

      // 切換畫面
      document.getElementById("screen1").classList.remove("active");
      document.getElementById("screen2").classList.add("active");
    });
  </script>
</body>
</html>
